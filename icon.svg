<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="14" ry="14" fill="#1A1D24"/>

  <!-- "Fly" in green -->
  <text x="64" y="52"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="42" font-weight="bold"
        fill="#27AE60" text-anchor="middle">Fly</text>

  <!-- Solid green underline -->
  <line x1="14" y1="62" x2="114" y2="62"
        stroke="#27AE60" stroke-width="3" stroke-linecap="round"/>

  <!-- "Path" in orange -->
  <text x="64" y="104"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="42" font-weight="bold"
        fill="#F0A500" text-anchor="middle">Path</text>

  <!-- Dashed orange underline -->
  <line x1="14" y1="114" x2="114" y2="114"
        stroke="#F0A500" stroke-width="3"
        stroke-dasharray="9,5" stroke-linecap="round"/>
</svg>
