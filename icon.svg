<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164 176" width="164" height="176">

  <!-- Background — dark navy, rounded corners -->
  <rect x="0" y="0" width="164" height="176" rx="12" fill="#1E2128"/>

  <!-- "Fly" — blue, top line -->
  <text x="12" y="92"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="56"
        fill="#2D6DB5">Fly</text>

  <!-- Underline under "Fly" -->
  <line x1="12" y1="93.5" x2="92.5" y2="93.5"
        stroke="#2D6DB5" stroke-width="3" stroke-linecap="round"/>

  <!-- "Path" — amber, bottom line -->
  <text x="12" y="158"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="56"
        fill="#F0A500">Path</text>

  <!-- Underline under "Path" — dashed -->
  <line x1="12" y1="160" x2="133" y2="160"
        stroke="#F0A500" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="7,4"/>

</svg>
